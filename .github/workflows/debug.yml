name: Debug Scanner

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: seen_alerts.json
          key: seen-alerts-${{ github.run_id }}
          restore-keys: |
            seen-alerts-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install requests numpy scikit-learn

      - name: Run debug
        run: python debug_scanner.py
