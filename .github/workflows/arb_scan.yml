name: ARB Scanner

on:
  schedule:
    - cron: '*/15 * * * *'   # ogni 15 minuti — cambia qui la frequenza
  workflow_dispatch:           # permette run manuale dal tab Actions

permissions:
  contents: write              # necessario per il commit del log CSV

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install requests numpy scikit-learn

      - name: Esegui scanner
        run: python arb_scanner.py   # ← cambia se il file si chiama diversamente

      - name: Commit log e cache
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add signals_log.csv seen_alerts.json || true
          git diff --staged --quiet || git commit -m "log: $(date -u +%Y%m%dT%H%M%SZ) [skip ci]"
          git push
