name: Arb Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore dedup cache
        uses: actions/cache@v4
        with:
          path: seen_alerts.json
          key: seen-alerts-${{ github.run_id }}
          restore-keys: |
            seen-alerts-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: python arb_scanner.py

      - name: Save dedup cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen_alerts.json
          key: seen-alerts-${{ github.run_id }}
